<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goa Roulette</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #1a1a1a;
            border: 2px solid #d4af37;
            border-radius: 14px;
            padding: 36px 28px;
            width: 90%;
            max-width: 340px;
            text-align: center;
        }
        .logo { font-size: 2.5rem; margin-bottom: 6px; }
        .title { font-size: 1.3rem; font-weight: 900; color: #d4af37; margin-bottom: 4px; }
        .subtitle { font-size: 0.7rem; color: #555; margin-bottom: 28px; letter-spacing: 1px; text-transform: uppercase; }
        input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            padding: 13px 14px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #d4af37; }
        input::placeholder { color: #444; }
        .btn-login {
            width: 100%;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 900;
            padding: 14px;
            cursor: pointer;
            margin-top: 4px;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #f0c842; }
        .btn-login:disabled { background: #555; color: #999; cursor: not-allowed; }
        .error {
            display: none;
            background: #b71c1c;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 14px;
        }
        .spinner {
            display: none;
            width: 22px; height: 22px;
            border: 3px solid #555;
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">🎰</div>
    <div class="title">GOA ROULETTE</div>
    <div class="subtitle">Authorised Access Only</div>
    <div class="error" id="err">❌ Invalid username or password</div>
    <div class="spinner" id="spinner"></div>
    <input id="u" type="text"     placeholder="Username" autocomplete="off" />
    <input id="p" type="password" placeholder="Password" autocomplete="off" />
    <button class="btn-login" id="btn" onclick="doLogin()">🔓 LOGIN</button>
</div>

function b64ToBytes(b64) {
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
}

async function doLogin() {
    const username = document.getElementById('u').value.trim();
    const password = document.getElementById('p').value.trim();
    const errEl    = document.getElementById('err');
    const spinner  = document.getElementById('spinner');
    const btn      = document.getElementById('btn');

    errEl.style.display = 'none';

    if (username !== 'roulette@123') {
        errEl.style.display = 'block';
        setTimeout(() => errEl.style.display = 'none', 3000);
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Unlocking...';
    spinner.style.display = 'block';

    try {
        const passBytes = new TextEncoder().encode(password);
        const keyMat = await crypto.subtle.importKey(
            'raw', passBytes, 'PBKDF2', false, ['deriveKey']
        );
        const key = await crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: b64ToBytes(SALT), iterations: 100000, hash: 'SHA-256' },
            keyMat,
            { name: 'AES-GCM', length: 256 },
            false,
            ['decrypt']
        );
        const decrypted = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv: b64ToBytes(IV) },
            key,
            b64ToBytes(ENC)
        );
        const html = new TextDecoder().decode(decrypted);
        document.open();
        document.write(html);
        document.close();
    } catch(e) {
        spinner.style.display = 'none';
        btn.disabled = false;
        btn.textContent = '🔓 LOGIN';
        errEl.style.display = 'block';
        setTimeout(() => errEl.style.display = 'none', 3000);
        document.getElementById('p').value = '';
    }
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});
</script>
